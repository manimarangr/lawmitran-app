# ─────────────────────────────────────────────────────────────
# QA override — pull prebuilt images, bind app ports to localhost.
# Host nginx proxies qa.lawmitran.com / api-qa.lawmitran.com to these.
#   IMAGE_TAG=<sha> docker compose -f infra/docker/compose.yml \
#                  -f infra/docker/compose.qa.override.yml up -d
# ─────────────────────────────────────────────────────────────
name: lawmitran-qa

services:
  backend:
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3201:3001"

  frontend:
    ports:
      - "127.0.0.1:3200:3000"

  # Data services: NO host ports — reachable only on the internal network.
